environment:
  sdk: '>=3.9.0 <4.0.0'
  flutter: ">=3.32.0"

# https://dart.dev/tools/pub/workspaces
workspace:
  - packages/ui

dependencies:
  flutter:
    sdk: flutter

  #flutter_web_plugins:
  #  sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any

  # Routing
  octopus: ^0.0.9

  # Annotation
  meta: any
  json_annotation: ^4.9.0

  # Utility
  collection: any
  async: any
  path: any
  convert: any
  path_provider: ^2.1.5
  platform_info: ^5.0.0
  #multiline: ^3.0.0
  rxdart: ^0.28.0
  url_launcher: ^6.3.2

  # Logger
  l: ^5.0.1

  # Desktop
  win32: ^5.14.0
  window_manager: ^0.5.1

  # State management
  control: ^0.2.0

  # Database
  shared_preferences: ^2.5.3
  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.39

  # Networking
  http: ^1.5.0
  #dio: ^5.4.2+1
  #dio_smart_retry: ^6.0.0

  # UI and Widgets
  cupertino_icons: ^1.0.8
  #google_fonts: ^6.2.1
  #font_awesome_flutter: ^10.7.0

  # Web
  web: ^1.1.1

  ui:
    path: ./packages/ui

dev_dependencies:
  # Unit & Widget tests for Flutter
  flutter_test:
    sdk: flutter
  # Integration tests for Flutter
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  test: 1.30.0

  # Code generation
  build_runner: ^2.4.15
  drift_dev: ^2.28.3
  # pubspec_generator: ^4.3.0
  flutter_gen_runner: ^5.12.0
  json_serializable: ^6.11.1
  # dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
  flutter_launcher_icons: ^0.14.4
  # dart run flutter_native_splash:create --path=flutter_native_splash.yaml
  flutter_native_splash: ^2.4.6


flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/

  # shaders:
  #   - packages/ui/shaders/shimmer.frag

flutter_intl:
  enabled: true
  class_name: GeneratedLocalization
  main_locale: en
  arb_dir: lib/src/common/localization
  output_dir: lib/src/common/localization/generated
  use_deferred_loading: false

flutter_gen:
  output: lib/src/common/constant/
  line_length: 120
