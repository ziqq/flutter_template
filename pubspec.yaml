name: flutter_template_name

description: "flutter_template_description"

publish_to: 'none'

version: 0.0.1+1

#homepage: https://github.com/

#repository: https://github.com/

#issue_tracker: https://github.com/

#funding:
#  - https://www.buymeacoffee.com/
#  - https://www.patreon.com/
#  - https://boosty.to/

#topics:
#  -
#  -

#platforms:
#  android:
#  ios:
#  linux:
#  macos:
#  web:
#  windows:

#screenshots:
#  - description: 'Screenshot 1'
#    path: screenshot_1.png

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: ">=3.44.0"

# https://dart.dev/tools/pub/workspaces
workspace:
  - packages/ui

dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter

  # Flutter WEB
  # flutter_web_plugins:
  #  sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any

  # Annotation
  meta: any
  json_annotation: ^4.12.0

  # Firrebase
  firebase_core: ^4.11.0
  firebase_messaging: ^16.4.0

  # Logger
  l: ^5.0.1

  # Desktop
  win32: any
  window_manager: ^0.5.1

  # State management
  control: ^0.2.0

  # Database
  shared_preferences: ^2.5.5
  drift: ^2.34.0
  drift_db_viewer: ^2.1.0
  sqlite3_flutter_libs: ^0.5.42

  # Networking
  http: ^1.6.0

  # Analytics
  sentry_flutter: ^9.22.0
  firebase_analytics: ^12.4.3

  # Utility
  collection: any
  convert: any
  async: any
  path: any
  flutter_in_store_app_version_checker: ^2.0.0
  flutter_badge_manager: ^0.3.2
  in_app_review: ^2.0.12
  path_provider: ^2.1.6
  platform_info: ^5.0.0
  #multiline: ^3.0.0
  crypto: ^3.0.7
  money2: ^6.3.0
  rxdart: ^0.28.0
  url_launcher: ^6.3.2
  connectivity_plus: ^7.1.1
  device_info_plus: ^12.4.0
  sensors_plus: ^7.0.0

  share_plus: ^12.0.2

  # UI and Widgets
  flutter_easyloading: ^3.0.5
  cupertino_icons: ^1.0.9
  file_picker: ^11.0.2
  image_picker: ^1.2.2

  # Web
  web: ^1.1.1

  ui:
    path: ./packages/ui

dev_dependencies:
  # Unit & Widget tests for Flutter
  flutter_test:
    sdk: flutter
  # Integration tests for Flutter
  integration_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # Testing
  test: any
  faker: any
  mockito: any
  plugin_platform_interface: ^2.1.8
  url_launcher_platform_interface: ^2.3.2
  firebase_messaging_platform_interface: ^4.9.0
  shared_preferences_platform_interface: ^2.4.2

  # Code generation
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  json_serializable: ^6.14.0
  # pubspec_generator: ^4.3.0
  flutter_gen_runner: ^5.14.1
  # dart run flutter_launcher_icons -f flutter_launcher_icons.yaml
  flutter_launcher_icons: ^0.14.4
  # dart run flutter_native_splash:create --path=flutter_native_splash.yaml
  flutter_native_splash: ^2.4.7


flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/

  # shaders:
  #   - packages/ui/shaders/shimmer.frag

flutter_intl:
  enabled: true
  class_name: GeneratedLocalization
  main_locale: en
  arb_dir: lib/src/common/localization/translations
  output_dir: lib/src/common/localization/generated
  use_deferred_loading: false

flutter_gen:
  output: lib/src/common/constant/
  line_length: 120
