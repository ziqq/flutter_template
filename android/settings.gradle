pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }
    settings.ext.flutterSdkPath = flutterSdkPath()

    includeBuild("${settings.ext.flutterSdkPath}/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        // Configure the Maven repository address for the HMS Core SDK.
        maven {url "https://developer.huawei.com/repo/"}
    }

    resolutionStrategy {
        eachPlugin {
            if (requested.id.id == "com.huawei.agconnect") {
                useModule("com.huawei.agconnect:agcp:${requested.version}")
            }
        }
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.13.0" apply false
    id "org.jetbrains.kotlin.android" version "2.4.0" apply false
    id "com.google.gms.google-services" version "4.4.4" apply false
    id "com.huawei.agconnect" version "1.9.5.302" apply false
}

dependencyResolutionManagement {
    versionCatalogs {
        libs {
            library("desugarJDKLibs", "com.android.tools:desugar_jdk_libs:2.1.5")
            plugin("android-application", "com.android.application").version("8.13.0")
        }
    }
}

include ":app"screen_retriever
