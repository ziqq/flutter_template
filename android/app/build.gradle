def taskNames = gradle.startParameter.taskNames.collect { it.toLowerCase() }
def applyHuaweiPlugin = taskNames.any { it.contains("hms") }
def applyGoogleServicesPlugin = taskNames.any {
    it.contains("stage") ||
    it.contains("prod") ||
    it.contains("dev") ||
    it.contains("gms")
}

if (applyGoogleServicesPlugin) {
    pluginManager.apply("com.google.gms.google-services")
}

if (applyHuaweiPlugin) {
    pluginManager.apply("com.huawei.agconnect")
}

