android {
    namespace = "dev.flutter.template.flutter_template_name"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility             = JavaVersion.VERSION_17
        targetCompatibility             = JavaVersion.VERSION_17
        // coreLibraryDesugaringEnabled = true
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "dev.flutter.template.flutter_template_name"

        // multiDexEnabled = true

        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk           = flutter.minSdkVersion
        targetSdk        = flutter.targetSdkVersion
        versionCode      = flutter.versionCode
        versionName      = flutter.versionName
    }

    signingConfigs {
        /* release {
            keyAlias      = keystoreProperties["keyAlias"]
            keyPassword   = keystoreProperties["keyPassword"]
            storePassword = keystoreProperties["storePassword"]
            storeFile     = keystoreProperties["storeFile"] ? file(keystoreProperties["storeFile"]) : null
        } */
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
            /* ndk {
                debugSymbolLevel = "SYMBOL_TABLE"
            } */
        }
    }

    // Specifies the flavor dimensions you want to use. The order in which you
    // list each dimension determines its priority, from highest to lowest,
    // when Gradle merges variant sources and configurations. You must assign
    // each product flavor you configure to one of the flavor dimensions.
    flavorDimensions "default"
    productFlavors {
        dev {
            applicationIdSuffix ".dev"
            dimension "default"
            manifestPlaceholders += [
                appname: "[DEV] Template",
                applink: "template-stage.com"
            ]
        }
        stage {
            applicationIdSuffix ".stg"
            dimension "default"
            manifestPlaceholders += [
                appname: "[STG] Template",
                applink: "template-stage.com"
            ]
        }
        // Build `prod` default
        prod {
            applicationIdSuffix ""
            dimension "default"
            manifestPlaceholders += [
                appname: "Template",
                applink: "template.com"
            ]
        }
        // Build `prod` with GMS Services
        gms {
            applicationIdSuffix ""
            dimension "default"
            manifestPlaceholders += [
                appname: "Template",
                applink: "template.com"
            ]
        }
        // Build `prod` with HSM Services
        hms {
            applicationIdSuffix ".hms"
            dimension "default"
            manifestPlaceholders += [
                appname: "Template",
                applink: "template.com"
            ]
        }
    }
}

