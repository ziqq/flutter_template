name: ui
description: Shared UI Components, Widgets, Fonts, Colors and Theme
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: ">=3.44.0"

# https://dart.dev/tools/pub/workspaces
resolution: workspace

dependencies:
  # Flutter SDK
  flutter:
    sdk: flutter

  # Localization
  flutter_localizations:
    sdk: flutter
  intl: any

  # Utility
  meta: any
  collection: any
  # google_fonts: any

dev_dependencies:
  # Unit & Widget tests for Flutter
  flutter_test:
    sdk: flutter
  # Integration tests for Flutter
  integration_test:
    sdk: flutter

  # Testing
  test: any

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # assets:
  #   - assets/

  # fonts:
  # - family: icomoon
  #   fonts:
  #     - asset: packages/ui/fonts/icomoon.ttf

  shaders:
    - packages/ui/shaders/shimmer.frag
